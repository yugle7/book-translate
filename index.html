<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Перевод</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="main-page">
    <input type="file" id="file-input" accept=".md,.txt" hidden/>
    <button id="upload-btn" class="upload-btn">Загрузить книгу</button>
    <ol id="books"></ol>
</div>

<div id="book-page" class="hidden">
    <article>
        <section class="title">
            <button id="at-main">←</button>
            <h1 id="title" contenteditable="plaintext-only"></h1>
        </section>
        <button id="translation">.md</button>
        <ol id="chapters"></ol>
    </article>
    <div id="gutter"></div>
    <form>
        <label>
            <select id="model" name="model">
                <option value="gpt4">GPT-4 Turbo</option>
                <option value="gpt3.5">GPT-3.5 Turbo</option>
                <option value="claude3">Claude 3 Opus</option>
            </select>
        </label>
        <label>
            <textarea id="rules" name="rules" placeholder="переводи хорошо&#10плохо не переводи" rows="3"></textarea>
        </label>
        <label>
            <textarea id="words" name="words" placeholder="fabric = фабрик&#10details = дитейлз" rows="3"></textarea>
        </label>
    </form>
    <button id="to-main" class="round-btn hided" title="Вернуться к загрузке">
        ←
    </button>
</div>

<div id="chapter-page" class="hidden">
    <span class="title">
        <button id="at-book">←</button>
        Перевод
    </span>
    <div></div>
    <span class="title">Original</span>
    <button id="to-book" class="round-btn hided" title="Вернуться к оглавлению">
        ←
    </button>
</div>

<script src="script.js"></script>
</body>
</html>
