<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Перевод</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="downloadScreen" class="download-screen">
      <div class="download-content">
        <p>Загрузите текстовый документ для перевода</p>
        <input type="file" id="fileInput" accept=".md,.txt" hidden />
        <button id="uploadBtn" class="upload-btn">Выбрать файл</button>
      </div>
    </div>

    <div class="grid hidden" id="resizableGrid">
      <span class="title">Перевод</span>
      <div></div>
      <span class="title">Original</span>
      <button id="backBtn" class="back-btn" title="Вернуться к загрузке">
        ←
      </button>
      <button id="saveBtn" class="save-btn" title="Сохранить перевод">↓</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
