<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Перевод</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="main">
    <input type="file" id="file" accept=".md,.txt" hidden/>
    <button id="upload">Загрузить книгу</button>
    <ol id="books"></ol>
</div>

<div id="book" class="hidden">
    <article>
        <section class="title">
            <button id="to-main" class="at">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                    <path d="M22 12H1M8 19L1 12L8 5"/>
                </svg>
            </button>
            <h1 id="title" contenteditable="plaintext-only"></h1>
        </section>
        <button id="download">
            <svg width="24px" height="24px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 15C3 17.8284 3 19.2426 3.87868 20.1213C4.75736 21 6.17157 21 9 21H15C17.8284 21 19.2426 21 20.1213 20.1213C21 19.2426 21 17.8284 21 15"/>
                <path d="M12 3V16M12 16L16 11.625M12 16L8 11.625"/>
            </svg>
        </button>
        <button id="erase" class="do">
            <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 6L18 18M18 6L6 18"/>
            </svg>
        </button>
        <ol id="chapters"></ol>
    </article>
    <form id="settings">
        <label>
            <select id="model" name="model">
                <option value="gpt4">GPT-4 Turbo</option>
                <option value="gpt3.5">GPT-3.5 Turbo</option>
                <option value="claude3">Claude 3 Opus</option>
            </select>
        </label>
        <label>
            <textarea id="rules" name="rules" placeholder="переводи хорошо&#10плохо не переводи" rows="3"></textarea>
        </label>
        <label>
            <textarea id="words" name="words" placeholder="fabric = фабрик&#10details = дитейлз" rows="3"></textarea>
        </label>
    </form>
    <div id="book-gutter"></div>
    <button id="to-main-round" class="to round hided" title="Вернуться к загрузке">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path d="M22 12H1M8 19L1 12L8 5"/>
        </svg>
    </button>
</div>

<button id="to-right" class="do">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <path d="M4 12H22M16 19L22 12L16 5"/>
    </svg>
</button>

<button id="to-left" class="do">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
        <path d="M20 12H2M8 19L2 12L8 5"/>
    </svg>
</button>


<div id="chapter" class="hidden">
    <span class="title left">
        <button id="to-book" class="at">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                <path d="M22 12H1M8 19L1 12L8 5"/>
            </svg>
        </button>
        Перевод
    </span>
    <span class="title right">Original</span>
    <div id="chapter-gutter"></div>
    <button id="to-book-round" class="to round hided" title="Вернуться к оглавлению">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path d="M22 12H1M8 19L1 12L8 5"/>
        </svg>
    </button>
</div>

<script src="script.js"></script>
</body>
</html>
